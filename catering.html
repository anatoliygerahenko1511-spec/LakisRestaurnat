<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catering — LAKI'S Family Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #262422; --gold: #C6995C; --gold-deep: #A87E45;
      --ivory: #F3EEE2; --cream: #F4F0E6; --ink: #2B2825; --taupe: #6F665A;
      --t: 220ms cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--charcoal); color: var(--ivory); font-family: 'Mulish', system-ui, sans-serif; min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; -webkit-font-smoothing: antialiased; }
    .eyebrow { font-weight: 700; font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
    h1 { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 800; line-height: 1.05; letter-spacing: -.015em; margin-bottom: 20px; }
    p { color: #C9C2B3; font-size: 18px; max-width: 46ch; line-height: 1.65; margin-bottom: 36px; }
    .rule { display: flex; align-items: center; gap: 14px; max-width: 200px; margin: 0 auto 32px; }
    .rule::before, .rule::after { content: ""; height: 1px; background: var(--gold); flex: 1; opacity: .4; }
    .rule i { width: 9px; height: 9px; background: var(--gold); transform: rotate(45deg); flex: none; }
    .btns { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
    .btn { font-family: 'Mulish', sans-serif; font-weight: 700; font-size: 15px; padding: 13px 26px; border-radius: 6px; border: 1.5px solid transparent; text-decoration: none; display: inline-block; transition: background var(--t), transform var(--t), box-shadow var(--t); }
    .btn-primary { background: var(--gold); color: var(--charcoal); }
    .btn-primary:hover { background: var(--gold-deep); transform: translateY(-2px); }
    .btn-outline { border-color: rgba(242,238,226,.25); color: var(--ivory); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
    .badge { display: inline-block; background: rgba(198,153,92,.12); border: 1px solid rgba(198,153,92,.3); border-radius: 999px; padding: 6px 16px; font-size: 13px; color: var(--gold); font-weight: 700; letter-spacing: .08em; margin-bottom: 28px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
  </style>
</head>
<body>

  <div class="badge">Coming Soon</div>
  <p class="eyebrow">LAKI's Family Restaurant · Catering</p>
  <h1>We'll Bring the<br>Table to You</h1>
  <div class="rule"><i></i></div>
  <p>The full catering page is on its way. In the meantime, call us directly to plan your event — family gatherings, office lunches, and everything in between.</p>

  <div class="btns">
    <a href="tel:+12896399659" class="btn btn-primary">☎&nbsp;&nbsp;(289) 639-9659</a>
    <a href="/" class="btn btn-outline">← Back to Home</a>
  </div>

</body>
</html>
